services:
  afv-server:
    image: crpi-a20te69e34l8yeun.ap-southeast-1.personal.cr.aliyuncs.com/skylite/skylite-afv-server
    restart: always
    ports:
      - "5000:5000/tcp"
      - "50000:50000/udp"
    environment:
      # HTTP API used as pilotclient voice api_url.
      - AFV_HTTP_HOST=0.0.0.0
      - AFV_HTTP_PORT=5000
      # UDP voice socket advertised to pilotclient after callsign registration.
      - AFV_UDP_HOST=0.0.0.0
      - AFV_UDP_PORT=50000
      - AFV_PUBLIC_VOICE_HOST=127.0.0.1
      - AFV_PUBLIC_VOICE_PORT=50000
      # Use "allow" for local tests, "webhook" for web-backend delegated auth.
      - AFV_AUTH_MODE=webhook
      - AFV_AUTH_WEBHOOK_URL=https://api.skylitefly.com/api/auth/pyfsd-auth/
      - AFV_AUTH_WEBHOOK_SECRET=sk-hmac-skylite-2026-xK9mP3vQ7wR1
      - AFV_TOKEN_TTL_SECONDS=3600
      # HF/VHF alias list (aliased.json).
      - AFV_ALIASED_FILE=
    # volumes:
    #   - ./data/aliased.json:/app/data/aliased.json:ro
